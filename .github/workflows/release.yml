name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".Trim()
            $tag = if ($version.StartsWith("v")) { $version } else { "v$version" }
            $version = $tag.TrimStart("v")
          } else {
            $tag = $env:GITHUB_REF_NAME
            $version = $tag.TrimStart("v")
          }
          if (-not ($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Version must look like 0.1.0 or 0.1.0-beta.1. Got: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate extension and native host
        shell: pwsh
        run: |
          node --check src\background.js
          node --check src\content.js
          node --check popup\popup.js
          node --check options\options.js
          node scripts\smoke-test.mjs
          python -m unittest discover -s native-host\tests

      - name: Install native build tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip uv
          uv --version

      - name: Build native host executable
        shell: pwsh
        run: .\scripts\build-native.ps1

      - name: Package release assets
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $title = "YouTube Local Exporter $tag"
          $notes = "dist\release\RELEASE_NOTES.md"
          $assetPaths = @(
            "dist\release\youtube-local-exporter-$tag-windows.zip",
            "dist\release\youtube-local-exporter-extension-$tag.zip",
            "dist\release\youtube-local-exporter-host-$tag-windows-x64.exe",
            "dist\release\SHA256SUMS.txt",
            "dist\release\release-manifest.json"
          ) | Where-Object { Test-Path $_ }

          $releaseExists = $false
          try {
            gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
            $releaseExists = $LASTEXITCODE -eq 0
          } catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload $tag @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $title --notes-file $notes --latest
          } else {
            gh release create $tag @assetPaths --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file $notes --latest
          }
